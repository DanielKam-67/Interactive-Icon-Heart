<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for Xuan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush: #ffd9e6;
    --lavender: #e3d3ff;
    --sky: #dcefff;
    --ink: #4a3860;
    --coral: #ff6f9c;
    --gold: #ffb15e;
    --lilac: #a58af0;
    --mint: #5fd6b4;
    --card: rgba(255,255,255,0.62);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    color: var(--ink);
    background: linear-gradient(135deg, var(--blush), var(--lavender) 55%, var(--sky));
    background-size: 200% 200%;
    animation: drift 18s ease-in-out infinite;
    overflow-x: hidden;
    position: relative;
  }
  @keyframes drift{
    0%,100%{ background-position: 0% 30%; }
    50%{ background-position: 100% 70%; }
  }
  @media (prefers-reduced-motion: reduce){ body{ animation: none; } }

  .ambient{ position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .amb-heart{
    position: absolute; bottom: -30px; opacity: 0; will-change: transform, opacity;
  }

  .confetti-layer{ position: fixed; inset: 0; pointer-events: none; z-index: 6; overflow: hidden; }
  .bit{ position: absolute; top: 50%; left: 50%; will-change: transform, opacity; }

  .flood-layer{ position: fixed; inset: 0; pointer-events: none; z-index: 20; overflow: hidden; }
  .flood-heart{ position: absolute; bottom: -60px; will-change: transform, opacity; }

  .milestone{
    position: fixed; inset: 0; z-index: 21; display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity .6s ease;
    text-align: center; padding: 0 30px;
  }
  .milestone.show{ opacity: 1; }
  .milestone-inner{
    background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 28px; padding: 34px 30px;
    box-shadow: 0 30px 70px -20px rgba(160,80,140,0.45);
    transform: scale(0.9); transition: transform .6s cubic-bezier(.2,.8,.3,1.2);
  }
  .milestone.show .milestone-inner{ transform: scale(1); }
  .milestone h2{
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 600;
    font-size: clamp(1.5rem, 5vw, 2.1rem); margin: 0 0 8px; color: var(--coral);
  }
  .milestone p{ margin: 0; opacity: 0.75; font-weight: 600; font-size: 0.95rem; }

  .wrap{
    position: relative; z-index: 2; max-width: 560px; margin: 0 auto;
    padding: 9vh 24px 8vh; text-align: center;
  }
  .eyebrow{
    font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 700; color: var(--coral); opacity: 0.85; margin-bottom: 16px;
  }
  h1{
    font-family: 'Fraunces', serif; font-weight: 600; font-style: italic;
    font-size: clamp(2rem, 7vw, 2.9rem); line-height: 1.15; margin: 0 0 12px; color: var(--ink);
  }
  h1 .name{ color: var(--coral); }
  .sub{ opacity: 0.6; font-weight: 600; font-size: 1rem; margin-bottom: 6vh; max-width: 40ch; margin-left:auto; margin-right:auto; }

  .card{
    position: relative;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 32px;
    padding: 42px 28px 34px;
    backdrop-filter: blur(10px);
    box-shadow: 0 30px 60px -25px rgba(150,90,150,0.4);
  }

  .joke{
    font-family: 'Fraunces', serif; font-weight: 500; font-style: italic;
    font-size: clamp(1.25rem, 4vw, 1.6rem); line-height: 1.5; color: var(--ink);
    min-height: 3.6em; display: flex; align-items: center; justify-content: center;
    transition: opacity .25s ease, transform .25s ease;
  }
  .joke.swap{ opacity: 0; transform: translateY(6px) scale(0.98); }

  .heart-btn{
    position: relative; width: 96px; height: 96px; margin: 26px auto 10px;
    background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .heart-btn svg{ width: 100%; height: 100%; transition: transform .18s cubic-bezier(.3,1.6,.5,1); filter: drop-shadow(0 10px 18px rgba(255,111,156,0.45)); }
  .heart-btn:active svg{ transform: scale(0.86); }
  .heart-btn.pop svg{ animation: pop .38s cubic-bezier(.3,1.8,.4,1); }
  @keyframes pop{ 0%{transform:scale(1);} 35%{transform:scale(1.22);} 100%{transform:scale(1);} }
  .heart-glow{
    position: absolute; inset: -14px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,111,156,0.35), transparent 70%);
    opacity: 0; transition: opacity .3s ease;
  }
  .heart-btn:hover .heart-glow{ opacity: 1; }

  .tap-hint{ font-size: 12px; font-weight: 700; opacity: 0.4; letter-spacing: .04em; margin-bottom: 30px; }

  .meter-wrap{ margin-top: 6px; }
  .meter-label{
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    font-weight: 700; opacity: 0.5; margin-bottom: 9px;
  }
  .meter-track{
    height: 9px; border-radius: 999px; background: rgba(74,56,96,0.1);
    overflow: hidden; max-width: 280px; margin: 0 auto;
  }
  .meter-fill{
    height: 100%; width: 0%; border-radius: 999px;
    background: linear-gradient(90deg, var(--mint), var(--lilac), var(--coral));
    transition: width .5s cubic-bezier(.2,.9,.3,1);
  }
  .meter-caption{ margin-top: 9px; font-size: 13px; font-weight: 700; opacity: 0.55; min-height: 18px; }

  .footer-note{
    margin-top: 7vh; font-size: 11px; letter-spacing: .05em; font-weight: 600; opacity: 0.35;
  }
</style>
</head>
<body>

<div class="ambient" id="ambient"></div>
<div class="confetti-layer" id="confetti"></div>
<div class="flood-layer" id="flood"></div>
<div class="milestone" id="milestone">
  <div class="milestone-inner">
    <h2 id="milestoneTitle">okay, you clearly like me back 🥹</h2>
    <p id="milestoneSub">five taps in. no take-backs now.</p>
  </div>
</div>
<div id="root"></div>

<script>
  function heartSVG(color, size){
    return `<svg viewBox="0 0 24 24" width="${size}" height="${size}"><path fill="${color}" d="M12 21s-7.5-4.9-9.6-9.2C.8 8.1 2.6 4.5 6 4.5c2 0 3.5 1.2 4 2.4.5-1.2 2-2.4 4-2.4 3.4 0 5.2 3.6 3.6 7.3C19.5 16.1 12 21 12 21z"/></svg>`;
  }
  const PALETTE = ['#ff6f9c','#ffb15e','#a58af0','#5fd6b4','#ff9dc0'];

  // ambient drifting hearts
  const ambientEl = document.getElementById('ambient');
  function spawnAmbient(){
    const h = document.createElement('div');
    h.className = 'amb-heart';
    const size = 10 + Math.random()*14;
    const color = PALETTE[Math.floor(Math.random()*PALETTE.length)];
    h.innerHTML = heartSVG(color, size);
    h.style.left = Math.random()*100+'%';
    h.style.opacity = 0.18 + Math.random()*0.22;
    ambientEl.appendChild(h);
    const dur = 7000 + Math.random()*5000;
    const sway = (Math.random()*60-30);
    h.animate([
      { transform: 'translate(0,0)', opacity: 0 },
      { transform: `translate(${sway*0.3}px,-45vh)`, opacity: parseFloat(h.style.opacity), offset: 0.15 },
      { transform: `translate(${sway}px,-115vh)`, opacity: 0 }
    ], { duration: dur, easing: 'ease-in-out' });
    setTimeout(()=>h.remove(), dur+100);
  }
  setInterval(spawnAmbient, 900);
  for(let i=0;i<6;i++) setTimeout(spawnAmbient, i*300);

  const JOKES = [
    "Are you Wi-Fi? Because I'm really feeling a connection, and also I'll be annoying about it later.",
    "I was going to say something smooth, but you're distractingly cute and I forgot it.",
    "On a scale of 1 to 10, you're a 9 — I'm the 1 you're missing.",
    "I'm not a photographer, but I can definitely picture the two of us getting bubble tea.",
    "Warning: prolonged exposure to this message may cause smiling in public.",
    "If being cute were a crime, you'd be serving a life sentence and I'd be your lawyer, working pro bono, obviously.",
    "I'd say 'do you believe in love at first sight,' but I've seen you more than once and I'm still into it.",
    "You must be made of copper and tellurium, because you're Cu-Te.",
    "This app has one job: remind you that someone thinks about you more than they'll admit.",
    "I'm currently accepting applications for 'person I text way too much.' You're overqualified.",
    "Some people count sheep to fall asleep. I just replay that one time you laughed at your own joke.",
    "Xuan, if you were a vegetable, you'd be a cute-cumber.",
    "I checked, and yes, my phone's autocorrect really does think you're the main character.",
    "This isn't a pickup line, it's a formal notice: you're stuck in my head, rent-free.",
    "Fair warning — I make questionable jokes and above-average tea recommendations.",
    "They say the best things in life are free. Also true: my undivided attention, currently yours.",
    "Not to be dramatic, but my day objectively gets better when you text back.",
    "Is your name Google? Because you're everything I've been searching for, and also a little scary how much I look you up."
  ];

  const MILESTONES = [
    { at: 5, title: "okay, you clearly like me back 🥹", sub: "five taps in. no take-backs now." },
    { at: 10, title: "ten. TEN. you're doing this on purpose.", sub: "I'm not complaining, just noting it for the record." },
    { at: 15, title: "at this point we should just get dinner", sub: "your move." }
  ];

  const METER_CAPTIONS = ["warming up…","getting fond of you…","this is becoming a whole thing…","dangerously charmed…","okay, full send…","certified smitten. no notes."];

  const root = document.getElementById('root');
  let usedIdx = [];
  let taps = 0;
  let hitMilestones = new Set();

  function pickJoke(){
    if(usedIdx.length >= JOKES.length) usedIdx = [];
    let idx;
    do{ idx = Math.floor(Math.random()*JOKES.length); } while(usedIdx.includes(idx));
    usedIdx.push(idx);
    return JOKES[idx];
  }

  function burstConfetti(){
    const layer = document.getElementById('confetti');
    for(let i=0;i<12;i++){
      const bit = document.createElement('div');
      bit.className = 'bit';
      const size = 12 + Math.random()*14;
      const color = PALETTE[Math.floor(Math.random()*PALETTE.length)];
      bit.innerHTML = heartSVG(color, size);
      const angle = Math.random()*Math.PI*2;
      const dist = 110 + Math.random()*170;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 50;
      const rot = (Math.random()*360)|0;
      const dur = 850 + Math.random()*450;
      layer.appendChild(bit);
      bit.animate([
        { transform: 'translate(-50%,-50%) translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(-50%,-50%) translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(.2,.8,.3,1)' });
      setTimeout(()=>bit.remove(), dur+50);
    }
  }

  function floodHearts(){
    const layer = document.getElementById('flood');
    const count = 90;
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const h = document.createElement('div');
        h.className = 'flood-heart';
        const size = 16 + Math.random()*26;
        const color = PALETTE[Math.floor(Math.random()*PALETTE.length)];
        h.innerHTML = heartSVG(color, size);
        h.style.left = Math.random()*100+'%';
        h.style.opacity = 0.7 + Math.random()*0.3;
        layer.appendChild(h);
        const dur = 2600 + Math.random()*1800;
        const sway = (Math.random()*140-70);
        h.animate([
          { transform: 'translate(0,0) rotate(0deg)', opacity: 0 },
          { transform: `translate(${sway*0.4}px,-55vh) rotate(${sway}deg)`, opacity: parseFloat(h.style.opacity), offset: 0.2 },
          { transform: `translate(${sway}px,-125vh) rotate(${sway*2}deg)`, opacity: 0 }
        ], { duration: dur, easing: 'ease-out' });
        setTimeout(()=>h.remove(), dur+100);
      }, i*18);
    }
  }

  function showMilestone(ms){
    const el = document.getElementById('milestone');
    document.getElementById('milestoneTitle').textContent = ms.title;
    document.getElementById('milestoneSub').textContent = ms.sub;
    floodHearts();
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2400);
  }

  function render(){
    root.innerHTML = `
      <div class="wrap">
        <div class="eyebrow">a small warning</div>
        <h1>hi <span class="name">Xuan</span>,<br>this button has opinions.</h1>
        <div class="sub">mostly about you. tap the heart as many times as your patience allows.</div>

        <div class="card">
          <div class="joke" id="joke">${JOKES[0]}</div>

          <button class="heart-btn" id="heartBtn" aria-label="tap for another">
            <span class="heart-glow"></span>
            ${heartSVG('#ff6f9c', 96)}
          </button>
          <div class="tap-hint">tap the heart</div>

          <div class="meter-wrap">
            <div class="meter-label">how obvious this is getting</div>
            <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
            <div class="meter-caption" id="meterCaption"></div>
          </div>
        </div>

        <div class="footer-note">made with too much free time, for you</div>
      </div>
    `;

    const jokeEl = document.getElementById('joke');
    const btn = document.getElementById('heartBtn');
    const meterFill = document.getElementById('meterFill');
    const meterCaption = document.getElementById('meterCaption');

    btn.addEventListener('click', ()=>{
      taps++;
      btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');
      burstConfetti();

      jokeEl.classList.add('swap');
      setTimeout(()=>{
        jokeEl.textContent = pickJoke();
        jokeEl.classList.remove('swap');
      }, 220);

      const pct = Math.min(100, taps*17);
      meterFill.style.width = pct + '%';
      const capIdx = Math.min(METER_CAPTIONS.length-1, taps-1);
      if(capIdx >= 0) meterCaption.textContent = METER_CAPTIONS[capIdx];
      if(taps >= 6){
        meterFill.style.width = '100%';
        meterCaption.textContent = METER_CAPTIONS[METER_CAPTIONS.length-1];
      }

      const ms = MILESTONES.find(m => m.at === taps);
      if(ms && !hitMilestones.has(ms.at)){
        hitMilestones.add(ms.at);
        setTimeout(()=>showMilestone(ms), 300);
      }
    });
  }

  render();
</script>
</body>
</html>
